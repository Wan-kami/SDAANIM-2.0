<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Panel Admin - Gestionar Adopciones</title>
        <link rel="stylesheet" href="../../css/style.css">
        <link rel="stylesheet" href="../../css/index.css">
        <link
            href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
            rel="stylesheet">

        <style>
        body {
            background-color: #f7f7f7;
            font-family: 'Arial', sans-serif;
        }


        .volver {
            color: #4CAF50;
            text-decoration: underline;
        }

        .admin-container {
            width: 90%;
            margin: 30px auto;
        }

        .admin-form {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .admin-form h2 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .admin-form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        .admin-form input[type="text"],
        .admin-form textarea,
        .admin-form input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 5px;
        }

        .admin-form button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }

        .admin-form button:hover {
            background-color: #45a049;
        }

        /* Grilla de mascotas */
        .adopta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .adopta-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .adopta-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .adopta-card h3 {
            color: #333;
            margin-top: 10px;
        }

        .adopta-card p {
            color: #555;
        }

        .fancy-btn {
            font-size: 16px;
            padding: 12px 30px;
            margin-left: 2.5%;
            background-color: #d8dde0ff;
            color: black;
            cursor: pointer;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .fancy-btn:hover {
            background-color: #6f9f84ff;
            color: white;
            transition: background-color 0.3s ease;
        }
    </style>
    </head>

    <body>
        <header>
            <h1>Panel de Adopciones</h1>

        </header>
        <br>
        <a href="../admi/index1.php" class="fancy-btn"><span>←
                Volver</span></a>

        <main class="admin-container">

            <!-- Formulario para agregar nuevo perrito -->
            <section class="admin-form">
                <h2>Agregar nuevo animal en adopción 🐾</h2>
                <form id="form-agregar" action="../../Php/R_anim.php" method="post" enctype="multipart/form-data">
                    <label for="nombre">Nombre del animal:</label>
                    <input type="text" id="nombre" name="nombre"
                        placeholder="Ej. Luna" required>

                    <label for="raza">Raza:</label>
                    <input type="text" id="raza" name="raza"
                        placeholder="Ej. pitbull" required>

                    <label for="edad">Edad</label>
                    <input type="text" id="edad" name="edad"
                        placeholder="Ej. 3 años" required>

                    <label for="imagen">Subir imagen:</label>
                    <input type="file" id="imagen" name="imagen"
                        accept="image/*" required>

                    <button type="submit" name="agregar">Agregar</button>
                </form>
            </section>

        </main>

        <footer id="contacto">
            <p>© 2025 Esperanza Animal BQ - Panel de Administración</p>
            <p>© 2025 AdoptaYa - Todos los derechos reservados</p>
        </footer>

    </body>

</html>
